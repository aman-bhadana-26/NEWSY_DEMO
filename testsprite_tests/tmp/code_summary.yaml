version: "2"
type: frontend
tech_stack:
  - JavaScript
  - React 18
  - Next.js 14
  - CSS Modules
  - Tailwind CSS
  - axios
features:
  - name: Landing Page
    description: Marketing landing page at root
    files:
      - frontend/pages/index.js
      - frontend/styles/Landing.module.css
    user_flows:
      - Navigate to /
      - View hero and CTA to home or login
  - name: Home Feed
    description: Main news homepage with categories, top stories, trending
    files:
      - frontend/pages/home.js
      - frontend/components/TopStories.js
      - frontend/components/TopTrending.js
      - frontend/components/CategoryFilter.js
      - frontend/components/NewsCard.js
    user_flows:
      - Navigate to /home
      - Browse news cards
      - Filter by category
      - Click article to open detail
  - name: Article Detail
    description: Single article page with comments and reactions
    files:
      - frontend/pages/article/[slug].js
      - frontend/components/ArticleComments.js
      - frontend/components/ArticleReactions.js
    user_flows:
      - Open article from home
      - Read content
      - Post comment when logged in
      - Toggle reaction when logged in
  - name: Authentication
    description: Login and signup with JWT stored in localStorage
    files:
      - frontend/pages/login.js
      - frontend/pages/signup.js
      - frontend/context/AuthContext.js
      - frontend/utils/api.js
    user_flows:
      - Register at /signup
      - Login at /login
      - Logout from navbar
      - Session persists on reload
  - name: User Profile
    description: View and edit profile, upload profile picture
    files:
      - frontend/pages/profile.js
      - frontend/styles/Profile.module.css
    user_flows:
      - Visit /profile when authenticated
      - Update name or email
      - Upload profile photo
    depends_on:
      - Authentication
  - name: My News
    description: Personalized feed and saved articles
    files:
      - frontend/pages/my-news.js
      - frontend/components/MyNewsCard.js
      - frontend/components/TopicSelector.js
    user_flows:
      - Visit /my-news
      - Set topic preferences
      - View saved articles
    depends_on:
      - Authentication
  - name: Trending
    description: Trending tech news page with topic classification
    files:
      - frontend/pages/trending.js
      - frontend/styles/Trending.module.css
    user_flows:
      - Navigate to /trending
      - Browse trending articles by topic
  - name: Analytics
    description: User reading analytics dashboard
    files:
      - frontend/pages/analytics.js
    user_flows:
      - Visit /analytics when logged in
      - View reading stats
    depends_on:
      - Authentication
  - name: Admin Dashboard
    description: Admin-only user management and site stats
    files:
      - frontend/pages/admin/index.js
      - frontend/pages/admin/users.js
    user_flows:
      - Admin login
      - View dashboard stats at /admin
      - Manage users at /admin/users
    depends_on:
      - Authentication
  - name: Internationalization
    description: Multi-language UI via LanguageContext
    files:
      - frontend/context/LanguageContext.js
      - frontend/components/LanguageSwitcher.js
      - frontend/utils/translations.js
    user_flows:
      - Switch language from navbar
      - UI strings update across pages
  - name: Static Pages
    description: About and contact pages
    files:
      - frontend/pages/about.js
      - frontend/pages/contact.js
    user_flows:
      - Visit /about and /contact
known_limitations:
  - issue: WebGL and Three.js components may not render in headless browsers
    location: frontend/components/Aurora.js
    impact: Visual-only; core navigation should still work
  - issue: Dev server single-threaded under concurrent E2E load
    location: frontend package.json dev script
    impact: TestSprite limits to 15 tests in development mode
